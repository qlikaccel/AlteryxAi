services:
  # Backend API Service
  - name: alteryx-api
    type: web
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/sorimdevs-tech/qlikscence.git
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt --no-cache-dir
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Frontend Static Site
  - name: alteryx-frontend
    type: staticSite
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/sorimdevs-tech/qlikscence.git
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: alteryx-api
          type: web
          property: host

envVarGroups:
  - name: qlik-secrets
    envVars:
      - key: QLIK_CLIENT_ID
        sync: false
      - key: QLIK_CLIENT_SECRET
        sync: false
      - key: API_KEY
        sync: false
