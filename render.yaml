services:
  # Backend API Service
  - name: qlik-api
    type: web
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/sorimdevs-tech/qlikscence.git
    rootDirectory: AlteryxAi/backend
    buildCommand: pip install -r requirements.txt --no-cache-dir
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: BUILD_COMMAND
        value: "pip install --upgrade pip && pip install pandas==2.2.0 --no-cache-dir && pip install -r requirements.txt --no-cache-dir"
      - key: QLIK_CLIENT_ID
        fromGroup: qlik-secrets
      - key: QLIK_CLIENT_SECRET
        fromGroup: qlik-secrets
      - key: API_KEY
        fromGroup: qlik-secrets
      - key: QLIK_TENANT_URL
        value: "https://vtcej92i1jgxph5.in.qlikcloud.com"
      - key: QLIK_API_BASE_URL
        value: "https://vtcej92i1jgxph5.in.qlikcloud.com/api/v1"

  # Frontend Static Site
  - name: qlik-frontend
    type: staticSite
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/sorimdevs-tech/qlikscence.git
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: qlik-api
          type: web
          property: host

envVarGroups:
  - name: qlik-secrets
    envVars:
      - key: QLIK_CLIENT_ID
        sync: false
      - key: QLIK_CLIENT_SECRET
